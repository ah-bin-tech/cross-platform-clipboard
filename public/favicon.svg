<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5856d6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆形 -->
  <rect width="32" height="32" rx="6" fill="url(#faviconGradient)" />

  <!-- 简化的剪贴板形状 -->
  <rect x="8" y="4" width="16" height="20" rx="3" fill="white" />

  <!-- 夹子 -->
  <rect x="12" y="2" width="8" height="4" rx="2" fill="#0071e3" />

  <!-- 内容线条 -->
  <rect x="10" y="10" width="12" height="1.5" rx="0.75" fill="#0071e3" opacity="0.8" />
  <rect x="10" y="14" width="10" height="1.5" rx="0.75" fill="#0071e3" opacity="0.6" />
  <rect x="10" y="18" width="11" height="1.5" rx="0.75" fill="#0071e3" opacity="0.6" />

  <!-- 同步箭头 -->
  <circle cx="24" cy="24" r="6" fill="white" />
  <path d="M24 21 L24 27 L21 24 M24 27 L27 24" stroke="#0071e3" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>