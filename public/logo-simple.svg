<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="simpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5856d6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 简化的剪贴板图标 -->
  <rect x="6" y="3" width="20" height="26" rx="4" fill="url(#simpleGradient)" />

  <!-- 夹子 -->
  <rect x="10" y="1.5" width="12" height="6" rx="3" fill="white" />

  <!-- 内容线条 -->
  <rect x="10" y="12" width="12" height="1.5" rx="0.75" fill="white" opacity="0.9" />
  <rect x="10" y="17" width="10" height="1.5" rx="0.75" fill="white" opacity="0.8" />
  <rect x="10" y="22" width="11" height="1.5" rx="0.75" fill="white" opacity="0.7" />

  <!-- 同步符号 -->
  <circle cx="24" cy="25" r="5" fill="white" />
  <path d="M24 22 L24 28 L21 25 M24 28 L27 25" stroke="#0071e3" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>