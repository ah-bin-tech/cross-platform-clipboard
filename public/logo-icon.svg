<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5856d6;stop-opacity:1" />
    </linearGradient>
    <filter id="iconShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <g filter="url(#iconShadow)">
    <!-- 剪贴板主体 -->
    <rect x="12" y="6" width="40" height="52" rx="8" fill="url(#iconGradient)" />

    <!-- 顶部夹子 -->
    <rect x="20" y="3" width="24" height="12" rx="6" fill="white" />
    <rect x="26" y="6" width="12" height="6" rx="3" fill="#f5f5f7" />

    <!-- 剪贴板内容 -->
    <rect x="20" y="24" width="24" height="3" rx="1.5" fill="white" opacity="0.9" />
    <rect x="20" y="34" width="20" height="3" rx="1.5" fill="white" opacity="0.8" />
    <rect x="20" y="44" width="22" height="3" rx="1.5" fill="white" opacity="0.7" />

    <!-- 同步箭头符号 -->
    <circle cx="48" cy="50" r="10" fill="white" />
    <path d="M48 44 L48 56 L42 50 M48 56 L54 50" stroke="#0071e3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>