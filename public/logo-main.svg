<svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5856d6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 图标部分 -->
  <g filter="url(#shadow)">
    <!-- 剪贴板形状 -->
    <rect x="8" y="4" width="36" height="44" rx="6" fill="url(#logoGradient)" />

    <!-- 顶部夹子 -->
    <rect x="16" y="2" width="20" height="8" rx="4" fill="white" />
    <rect x="20" y="4" width="12" height="4" rx="2" fill="#f5f5f7" />

    <!-- 剪贴板内容线条 -->
    <rect x="16" y="20" width="20" height="2" rx="1" fill="white" opacity="0.9" />
    <rect x="16" y="28" width="16" height="2" rx="1" fill="white" opacity="0.7" />
    <rect x="16" y="36" width="18" height="2" rx="1" fill="white" opacity="0.7" />

    <!-- 同步/箭头符号 -->
    <circle cx="40" cy="38" r="8" fill="white" />
    <path d="M40 34 L40 42 L36 38 M40 42 L44 38" stroke="#0071e3" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 文字部分 -->
  <text x="58" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="600" fill="#1d1d1f">
    CrossPlatform
  </text>
  <text x="58" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="400" fill="#86868b">
    Clipboard
  </text>
</svg>